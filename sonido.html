<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Audio & Stage Plot • Ensancha 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-black: #000000; 
            --panel-bg: #090c14; 
            --ensancha-yellow: #ffcc00;
            --ensancha-green: #00cc66;
            --ensancha-blue: #00a0ff;
            --ensancha-pink: #ff66b2;
            --ensancha-orange: #ff7b00;
            --ensancha-cyan: #00ffcc;
            --text-muted: #4e576f;
            --border-window: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-black);
            color: #ffffff;
            margin: 0;
            padding: 16px;
            box-sizing: border-box;
            min-height: 100vh;
            letter-spacing: -0.2px;
        }

        body::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 6px;
            background: linear-gradient(90deg, var(--ensancha-yellow), var(--ensancha-green), var(--ensancha-blue), var(--ensancha-pink), var(--ensancha-orange), var(--ensancha-cyan));
            z-index: 100;
        }

        .main-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #141923; padding-bottom: 10px; margin-bottom: 20px; margin-top: 5px;
        }
        .title-main { font-size: 22px; font-weight: 900; letter-spacing: 2px; margin: 0; font-family: 'Syne', sans-serif; }
        .title-sub { font-size: 11px; font-weight: 700; letter-spacing: 5px; color: var(--ensancha-cyan); text-transform: uppercase; margin-top: 2px; }
        .badge-admin { background: var(--ensancha-cyan); color: #000; padding: 5px 12px; border-radius: 4px; font-size: 10px; font-weight: 700; letter-spacing: 1px; }

        .admin-tabs { display: flex; gap: 5px; margin-bottom: 15px; background: #04060a; padding: 4px; border-radius: 8px; border: 1px solid var(--border-window); }
        .admin-tab-btn { flex: 1; background: transparent; border: none; color: var(--text-muted); padding: 12px; font-weight: 700; font-size: 13px; cursor: pointer; border-radius: 6px; transition: all 0.2s; text-transform: uppercase; letter-spacing: 1px; }
        .admin-tab-btn.active { background: #141923; border: 1px solid rgba(255,255,255,0.05); color: var(--ensancha-yellow); }

        .grid-audio { display: grid; grid-template-columns: 1fr; gap: 20px; }
        @media(min-width: 1200px) { .grid-audio { grid-template-columns: 310px 1fr; } }

        .panel {
            background: var(--panel-bg); border: 1px solid #141923; border-radius: 12px; padding: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.9); height: fit-content; display: flex; flex-direction: column;
        }
        .panel-title { font-size: 12px; font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 15px; border-bottom: 1px solid #141923; padding-bottom: 8px; }

        /* Banca de músicos del día */
        .musicians-vault { display: flex; flex-direction: column; gap: 0.5rem; max-height: 650px; overflow-y: auto; padding-right: 4px; }
        .draggable-musician {
            background: rgba(255, 255, 255, 0.02); border: 1px solid var(--border-window);
            padding: 0.7rem 0.85rem; border-radius: 8px; font-size: 0.8rem; font-weight: 600;
            cursor: grab; display: flex; justify-content: space-between; align-items: center;
            transition: all 0.2s;
        }
        .draggable-musician:hover { background: rgba(255,255,255,0.05); border-color: rgba(255,255,255,0.2); }
        .draggable-musician .musician-role { font-size: 0.65rem; color: var(--ensancha-pink); font-weight: 700; text-transform: uppercase; background: rgba(255, 102, 178, 0.1); padding: 2px 6px; border-radius: 4px; }

        /* 🎪 STAGE PLOT CANVAS */
        .stage-container { display: grid; grid-template-rows: 450px 1fr; gap: 20px; }
        .stage-canvas {
            background: radial-gradient(circle at center, #111524 0%, #040508 100%);
            border: 2px dashed rgba(0, 255, 204, 0.15); border-radius: 12px;
            position: relative; overflow: hidden; width: 100%; height: 100%;
        }
        .stage-canvas::before {
            content: "LÍNEA TRASERA (BATERÍA / SECUENCIAS / RACKS)";
            position: absolute; top: 1rem; left: 50%; transform: translateX(-50%);
            font-size: 0.65rem; color: rgba(255,255,255,0.12); font-weight: 800; letter-spacing: 0.15em; white-space: nowrap;
        }
        .stage-canvas::after {
            content: "LÍNEA FRONTAL (VOCES / ALTAR PRINCIPAL / PÚBLICO)";
            position: absolute; bottom: 1rem; left: 50%; transform: translateX(-50%);
            font-size: 0.65rem; color: rgba(255,255,255,0.12); font-weight: 800; letter-spacing: 0.15em; white-space: nowrap;
        }

        /* Ficha Escenario */
        .placed-musician {
            position: absolute; background: #060912; border: 1px solid var(--ensancha-cyan);
            padding: 0.7rem 0.6rem; border-radius: 8px; font-size: 0.75rem;
            display: flex; flex-direction: column; gap: 0.2rem; cursor: move;
            box-shadow: 0 15px 35px rgba(0,0,0,0.9); min-width: 130px; text-align: center; z-index: 10;
        }
        .placed-musician strong { color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block; font-size: 12px; }
        .placed-musician span { color: var(--ensancha-yellow); font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-remove-node { position: absolute; top: -7px; right: -7px; width: 18px; height: 18px; background: #ff4444; border: none; border-radius: 50%; color: #fff; font-size: 0.65rem; font-weight: 800; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }

        .musician-tag-container { display: flex; flex-direction: column; gap: 3px; margin-top: 5px; width: 100%; }
        .mini-audio-tag { background: rgba(0, 255, 204, 0.06); border: 1px solid rgba(0, 255, 204, 0.15); color: #c7fff4; font-size: 0.6rem; padding: 2px 4px; border-radius: 4px; text-align: left; font-family: 'JetBrains Mono', monospace; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        /* 📋 INPUT LIST TABLE */
        .table-wrapper { overflow-x: auto; border-radius: 8px; border: 1px solid #141923; background: #04060a; margin-top: 5px; }
        .input-table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.8rem; }
        .input-table th { background: #0d111a; color: var(--text-muted); font-weight: 700; padding: 12px; text-transform: uppercase; font-size: 0.65rem; letter-spacing: 0.05em; border-bottom: 1px solid #141923; }
        .input-table td { padding: 8px 12px; border-bottom: 1px solid #141923; vertical-align: middle; }
        
        .input-table input, .input-table select {
            background: #000000; border: 1px solid #141923;
            color: #fff; padding: 7px 10px; border-radius: 6px; font-size: 0.75rem; outline: none; width: 100%; box-sizing: border-box;
        }
        .input-table input:focus, .input-table select:focus { border-color: var(--ensancha-cyan); }
        .ch-number { font-weight: 800; color: var(--ensancha-green); text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 13px; }

        .btn {
            background: #ffffff; color: #000000; border: none; padding: 12px 24px; font-weight: 700;
            border-radius: 6px; cursor: pointer; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; transition: all 0.2s;
        }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .btn-cyan { background: var(--ensancha-cyan); color: #000; box-shadow: 0 4px 15px rgba(0, 255, 204, 0.2); }
        .btn-add-ch { background: rgba(255,255,255,0.02); color: #8e95a5; border: 1px dashed #141923; padding: 10px; font-size: 11px; margin-top: 12px; border-radius: 6px; width: 100%; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .btn-add-ch:hover { background: rgba(0, 255, 204, 0.04); border-color: var(--ensancha-cyan); color: var(--ensancha-cyan); }

        .empty-state { color: var(--text-muted); font-size: 0.75rem; font-style: italic; text-align: center; padding: 20px 0; }
        .footer-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="main-header" style="display: block; text-align: center; border-bottom: 1px solid #141923; padding-bottom: 15px; margin-top: 5px;">
        <img src="https://firebasestorage.googleapis.com/v0/b/ensancha-gestion.firebasestorage.app/o/IMG_0665.JPG?alt=media" alt="Ensancha Doble Porción" style="width: 100%; max-width: 600px; height: auto; display: block; margin: 0 auto; border-radius: 4px;">
        
        <div class="logo-area" style="margin-top: 15px; margin-bottom: 10px;">
            <h2 class="title-main" style="margin: 0;">ENSANCHA 2026</h2>
            <span class="title-sub">Rider de Audio & Stage Plot</span>
        </div>

    </div>

    <div class="admin-tabs">
        <button class="admin-tab-btn active" onclick="switchAudioDay('jueves')">Jueves</button>
        <button class="admin-tab-btn" onclick="switchAudioDay('viernes')">Viernes</button>
        <button class="admin-tab-btn" onclick="switchAudioDay('sabado')">Sábado</button>
    </div>

    <h3 id="audio-block-title" style="font-size: 15px; margin-bottom: 15px; color: var(--ensancha-yellow); text-transform: uppercase; letter-spacing: 1.5px;">Día Activo: JUEVES</h3>

    <div class="grid-audio">
        
        <div class="panel">
            <div class="panel-title" style="color: var(--ensancha-pink)">Músicos Asignados Hoy</div>
            <div class="musicians-vault" id="vaultMúsicos">
                <div class="empty-state">Buscando alineación del día...</div>
            </div>
        </div>

        <div class="stage-container">
            
            <div class="stage-canvas" id="escenarioStageplot"></div>

            <div class="panel" style="margin-bottom: 40px;">
                <div class="panel-title" style="color: var(--ensancha-cyan); margin-bottom: 5px;">🎚️ Input List del Altar</div>
                <div class="table-wrapper">
                    <table class="input-table">
                        <thead>
                            <tr>
                                <th style="width: 50px; text-align: center;">CH</th>
                                <th style="width: 240px;">Músico en Escenario</th>
                                <th style="width: 200px;">Instrumento / Línea</th>
                                <th style="width: 200px;">Tipo de Conexión</th>
                                <th>Notas / Monitoreo (In-Ears)</th>
                            </tr>
                        </thead>
                        <tbody id="tbodyInputList"></tbody>
                    </table>
                </div>

                <button type="button" class="btn-add-ch" onclick="addExtraChannelRow()">+ Añadir Canal Extra a la Consola</button>

                <div class="footer-actions">
                    <button type="button" class="btn btn-cyan" onclick="saveAudioConfigDay()">Guardar Configuración del Día</button>
                </div>
            </div>

        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCrdNyJnjeeoqGUrCQYKNIOfTaZf59WkbE",
            authDomain: "ensancha-gestion.firebaseapp.com",
            projectId: "ensancha-gestion",
            storageBucket: "ensancha-gestion.firebasestorage.app",
            messagingSenderId: "692646472593",
            appId: "1:692646472593:web:1022e5eef8f2c3a9fc4830"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let cronogramaGlobal = {};
        let currentDay = 'jueves';
        let currentChannelCount = 0;
        let musicosDelDiaActual = []; // Filtrados dinámicamente

        window.switchAudioDay = function(day) {
            document.querySelectorAll('.admin-tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            currentDay = day;
            renderAudioWorkspace();
        }

        async function loadAudioConfigInicial() {
            const docSnap = await getDoc(doc(db, "cronograma", "eventos"));
            if (docSnap.exists()) {
                cronogramaGlobal = docSnap.data();
            }
            renderAudioWorkspace();
        }

        // 🎻 FILTRAR Y RENDERIZAR LA BANCA EXCLUSIVA DEL DÍA SELECCIONADO
        function filtrarYRenderizarBancaDelDia() {
            const vault = document.getElementById('vaultMúsicos');
            vault.innerHTML = '';

            const setUnico = new Map();
            const turnos = ['am', 'pm'];

            // Extraer músicos de la mañana y de la tarde del día actual únicamente
            turnos.forEach(t => {
                const musicos = cronogramaGlobal[currentDay]?.[t]?.musicos || [];
                musicos.forEach(m => {
                    if(m.nombre && m.nombre.trim() !== "") {
                        setUnico.set(m.nombre.trim(), m.rol || "Músico");
                    }
                });
            });

            musicosDelDiaActual = Array.from(setUnico, ([nombre, rol]) => ({ nombre, rol }));

            // 📋 ORDEN TÉCNICO E ESTRATÉGICO DE LA BANDA
            const ordenPrioridad = [
                "keys 1",
                "keys 2",
                "bajo",
                "guitarra",
                "batería",
                "bateria",
                "percu"
            ];

            // Ordenamiento inteligente basado en la matriz de arriba
            musicosDelDiaActual.sort((a, b) => {
                const rolA = (a.rol || "").toLowerCase().trim();
                const rolB = (b.rol || "").toLowerCase().trim();

                let indexA = ordenPrioridad.findIndex(p => rolA.includes(p));
                let indexB = ordenPrioridad.findIndex(p => rolB.includes(p));

                // Si un rol no está mapeado (ej: voces o directores), se envía al fondo
                if (indexA === -1) indexA = 999;
                if (indexB === -1) indexB = 999;

                if (indexA !== indexB) {
                    return indexA - indexB;
                }
                
                // Si dos músicos comparten exactamente el mismo rol, los ordena alfabéticamente
                return a.nombre.localeCompare(b.nombre);
            });

            if (musicosDelDiaActual.length === 0) {
                vault.innerHTML = `<div class="empty-state">No hay músicos asignados en el cronograma para este día.</div>`;
                return;
            }

            musicosDelDiaActual.forEach((m, idx) => {
                vault.insertAdjacentHTML('beforeend', `
                    <div class="draggable-musician" draggable="true" id="day-musico-${idx}" data-nombre="${m.nombre}" data-rol="${m.rol}">
                        <span>${m.nombre}</span>
                        <span class="musician-role">${m.rol}</span>
                    </div>
                `);

                const itemEl = document.getElementById(`day-musico-${idx}`);
                itemEl.addEventListener('dragstart', (e) => {
                    e.dataTransfer.setData("text/plain", JSON.stringify({ nombre: m.nombre, rol: m.rol }));
                });
            });
        }

        // 🎛️ CONSTRUIR WORKSPACE COMPLETO
        window.renderAudioWorkspace = function() {
            document.getElementById('audio-block-title').innerText = `Día Activo: ${currentDay.toUpperCase()}`;
            
            // Generar la banca limpia según el día activo
            filtrarYRenderizarBancaDelDia();
            
            const dayData = cronogramaGlobal[currentDay] || {};
            const configAudioDia = dayData.audioConfigDay || {};
            const inputListGuardado = configAudioDia.inputList || [];
            const stageplotGuardado = configAudioDia.stageplot || [];

            const tbody = document.getElementById('tbodyInputList');
            tbody.innerHTML = '';
            currentChannelCount = 0;

            // Generar selectores restringidos a los músicos de este día
            let optionsMusicos = `<option value="">— Canal Libre —</option>`;
            musicosDelDiaActual.forEach(m => {
                optionsMusicos += `<option value="${m.nombre}">${m.nombre} (${m.rol})</option>`;
            });

            const canalesAGenerar = Math.max(16, inputListGuardado.length);
            for (let i = 0; i < canalesAGenerar; i++) {
                const backupData = inputListGuardado[i] || { musico: "", instrumento: "", conexion: "Línea Directa (DI)", notas: "" };
                appendChannelRow(i + 1, optionsMusicos, backupData);
            }

            const canvas = document.getElementById('escenarioStageplot');
            canvas.innerHTML = '';

            stageplotGuardado.forEach(nodo => {
                inyectarMusicoAlEscenarioCanvas(canvas, nodo.nombre, nodo.rol, nodo.posX, nodo.posY);
            });

            sincronizarEtiquetasStageplot();
        }

        function appendChannelRow(chNumber, optionsHtml, data) {
            const tbody = document.getElementById('tbodyInputList');
            const tr = document.createElement('tr');
            tr.className = 'channel-row-item';
            tr.innerHTML = `
                <td class="ch-number">${chNumber}</td>
                <td><select class="sel-musico-ch">${optionsHtml}</select></td>
                <td><input type="text" class="inp-inst-ch" placeholder="Ej: Voz Lead, Bajo, Teclado L" value="${data.instrumento}"></td>
                <td>
                    <select class="sel-con-ch">
                        <option value="Línea Directa (DI)" ${data.conexion === 'Línea Directa (DI)' ? 'selected' : ''}>Línea Directa (DI)</option>
                        <option value="Micrófono Vocal Inalámbrico" ${data.conexion === 'Micrófono Vocal Inalámbrico' ? 'selected' : ''}>Micrófono Vocal Inalámbrico</option>
                        <option value="Micrófono Shure SM57" ${data.conexion === 'Micrófono Shure SM57' ? 'selected' : ''}>Micrófono Shure SM57</option>
                        <option value="Caja Directa Stereo (DI)" ${data.conexion === 'Caja Directa Stereo (DI)' ? 'selected' : ''}>Caja Directa Stereo (DI)</option>
                        <option value="Conexión XLR Directa" ${data.conexion === 'Conexión XLR Directa' ? 'selected' : ''}>Conexión XLR Directa</option>
                    </select>
                </td>
                <td><input type="text" class="inp-notas-ch" placeholder="Monitoreo, EQ, notas..." value="${data.notas}"></td>
            `;

            tbody.appendChild(tr);
            tr.querySelector('.sel-musico-ch').value = data.musico;

            tr.querySelector('.sel-musico-ch').addEventListener('change', () => sincronizarEtiquetasStageplot());
            tr.querySelector('.inp-inst-ch').addEventListener('input', () => sincronizarEtiquetasStageplot());
            
            currentChannelCount = chNumber;
        }

        window.addExtraChannelRow = function() {
            let optionsMusicos = `<option value="">— Canal Libre —</option>`;
            musicosDelDiaActual.forEach(m => { optionsMusicos += `<option value="${m.nombre}">${m.nombre} (${m.rol})</option>`; });
            appendChannelRow(currentChannelCount + 1, optionsMusicos, { musico: "", instrumento: "", conexion: "Línea Directa (DI)", notas: "" });
        }

        const canvasEscenario = document.getElementById('escenarioStageplot');
        canvasEscenario.addEventListener('dragover', (e) => e.preventDefault());
        canvasEscenario.addEventListener('drop', (e) => {
            e.preventDefault();
            const rawData = e.dataTransfer.getData("text/plain");
            if (!rawData) return;

            const datos = JSON.parse(rawData);
            const rect = canvasEscenario.getBoundingClientRect();
            const posX = ((e.clientX - rect.left) / rect.width) * 100;
            const posY = ((e.clientY - rect.top) / rect.height) * 100;

            let duplicado = false;
            document.querySelectorAll('.placed-musician').forEach(el => {
                if(el.getAttribute('data-fullname') === datos.nombre) duplicado = true;
            });

            if(!duplicado) {
                inyectarMusicoAlEscenarioCanvas(canvasEscenario, datos.nombre, datos.rol, posX, posY);
                sincronizarEtiquetasStageplot();
            }
        });

        function inyectarMusicoAlEscenarioCanvas(canvas, nombre, rol, x, y) {
            const idNodo = 'node-' + Math.random().toString(36).substring(2, 9);
            const div = document.createElement('div');
            div.className = 'placed-musician';
            div.id = idNodo;
            div.style.left = `${x}%`;
            div.style.top = `${y}%`;
            div.setAttribute('data-fullname', nombre);

            div.innerHTML = `
                <button class="btn-remove-node" id="btn-del-${idNodo}">✕</button>
                <strong>${nombre}</strong>
                <span>${rol}</span>
                <div class="musician-tag-container"></div>
            `;

            canvas.appendChild(div);

            document.getElementById(`btn-del-${idNodo}`).onclick = (e) => {
                e.stopPropagation();
                div.remove();
                sincronizarEtiquetasStageplot();
            };

            div.onmousedown = function(event) {
                event.stopPropagation();
                let shiftX = event.clientX - div.getBoundingClientRect().left;
                let shiftY = event.clientY - div.getBoundingClientRect().top;

                function moveAt(clientX, clientY) {
                    let canvasRect = canvas.getBoundingClientRect();
                    let newX = ((clientX - canvasRect.left - shiftX) / canvasRect.width) * 100;
                    let newY = ((clientY - canvasRect.top - shiftY) / canvasRect.height) * 100;
                    
                    if(newX >= 0 && newX <= 85) div.style.left = newX + '%';
                    if(newY >= 0 && newY <= 88) div.style.top = newY + '%';
                }

                function onMouseMove(e) { moveAt(e.clientX, e.clientY); }
                document.addEventListener('mousemove', onMouseMove);
                
                document.onmouseup = function() {
                    document.removeEventListener('mousemove', onMouseMove);
                    document.onmouseup = null;
                };
            };
            div.ondragstart = () => false;
        }

        window.sincronizarEtiquetasStageplot = function() {
            const mapaMusicoCanales = {};

            document.querySelectorAll('.channel-row-item').forEach(row => {
                const ch = row.querySelector('.ch-number').innerText;
                const musico = row.querySelector('.sel-musico-ch').value;
                const instrumento = row.querySelector('.inp-inst-ch').value.trim();

                if (musico) {
                    if (!mapaMusicoCanales[musico]) mapaMusicoCanales[musico] = [];
                    mapaMusicoCanales[musico].push({ ch: ch, linea: instrumento || "Línea Activa" });
                }
            });

            document.querySelectorAll('.placed-musician').forEach(tarjeta => {
                const nombreCompleto = tarjeta.getAttribute('data-fullname');
                const contenedorTags = tarjeta.querySelector('.musician-tag-container');
                contenedorTags.innerHTML = '';

                const ruteos = mapaMusicoCanales[nombreCompleto];
                if (ruteos) {
                    ruteos.forEach(r => {
                        contenedorTags.insertAdjacentHTML('beforeend', `
                            <div class="mini-audio-tag">CH ${r.ch}: ${r.linea}</div>
                        `);
                    });
                }
            });
        }

        window.saveAudioConfigDay = async function() {
            const stageNodes = [];
            document.querySelectorAll('.placed-musician').forEach(div => {
                stageNodes.push({
                    nombre: div.getAttribute('data-fullname'),
                    rol: div.querySelector('span').innerText,
                    posX: parseFloat(div.style.left),
                    posY: parseFloat(div.style.top)
                });
            });

            const inputListData = [];
            document.querySelectorAll('.channel-row-item').forEach(row => {
                inputListData.push({
                    musico: row.querySelector('.sel-musico-ch').value,
                    instrumento: row.querySelector('.inp-inst-ch').value,
                    conexion: row.querySelector('.sel-con-ch').value,
                    notas: row.querySelector('.inp-notas-ch').value
                });
            });

            if (!cronogramaGlobal[currentDay]) cronogramaGlobal[currentDay] = {};

            cronogramaGlobal[currentDay].audioConfigDay = {
                stageplot: stageNodes,
                inputList: inputListData
            };

            try {
                await setDoc(doc(db, "cronograma", "eventos"), cronogramaGlobal);
                alert(`☁️ ¡Configuración unificada para el ${currentDay.toUpperCase()} guardada con éxito!`);
            } catch (err) {
                console.error(err);
                alert("Error al guardar la configuración.");
            }
        }

        loadAudioConfigInicial();
    </script>
</body>
</html>
